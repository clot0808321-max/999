<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>結帳</title><link rel="stylesheet" href="css/style.css"></head><body><div id="siteHeader"></div><main class="container"><h1>結帳</h1><div class="form"><div id="sum"></div><input class="input" id="customerName" placeholder="姓名"><input class="input" id="phone" placeholder="電話"><input class="input" id="contact" placeholder="Telegram / LINE / WhatsApp"><input class="input" id="address" placeholder="收貨地址"><h3>付款方式</h3><div class="payBox"><div class="pay active" data-pay="客服確認">客服確認</div><div class="pay" data-pay="USDT">USDT</div><div class="pay" data-pay="ABA">ABA</div><div class="pay" data-pay="現金">現金</div></div><div id="payInfo" class="notice"></div><textarea class="input" id="note" rows="4" placeholder="備註"></textarea><button class="btn orange" onclick="submitOrder()">送出訂單</button></div></main><div id="siteFooter"></div><script src="js/main.js"></script><script>
let pay='客服確認', config={};function calc(){let c=getCart();let t=c.reduce((s,i)=>s+i.price*i.quantity,0);sum.innerHTML=`<div class="notice">商品 ${c.length} 項，總金額：<b>${money(t)}</b></div>`}function renderPay(){let p=config.payment||{};payInfo.innerHTML=pay==='USDT'?`USDT 收款地址：<b>${p.usdtAddress||'尚未設定'}</b><br>網路：${p.usdtNetwork||'TRC20'}<br>付款後請備註訂單編號給客服。`:pay==='ABA'?`ABA帳戶：${p.abaName||'尚未設定'}<br>帳號：${p.abaNumber||'尚未設定'}<br>付款後請截圖給客服。`:pay==='現金'?(p.cashNote||'客服會確認現金付款方式。'):'送出後客服會確認最適合的付款方式。'}document.addEventListener('click',e=>{let el=e.target.closest('.pay');if(!el)return;document.querySelectorAll('.pay').forEach(x=>x.classList.remove('active'));el.classList.add('active');pay=el.dataset.pay;renderPay()});async function init(){config=await api('/api/config');calc();renderPay()}async function submitOrder(){let items=getCart();if(!items.length)return alert('購物車是空的');let data={customerName:customerName.value,phone:phone.value,contact:contact.value,address:address.value,note:note.value,paymentMethod:pay,items};if(!data.customerName||!data.phone||!data.address)return alert('請填姓名、電話、地址');try{let o=await api('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});localStorage.removeItem(cartKey);alert('訂單已送出：'+o.id+'\\n管理員會收到TG通知（若已設定Bot）。');location.href='track.html?id='+o.id}catch(e){alert(e.message)}}init()
</script></body></html>
