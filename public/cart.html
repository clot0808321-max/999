<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>購物車</title><link rel="stylesheet" href="css/style.css"></head><body><div id="siteHeader"></div><main class="container"><h1>購物車</h1><div id="box"></div></main><div id="siteFooter"></div><script src="js/main.js"></script><script>
function render(){let c=getCart();if(!c.length){box.innerHTML='<div class="empty">購物車是空的</div>';return}let total=c.reduce((s,i)=>s+i.price*i.quantity,0);box.innerHTML=`<table class="table"><tr><th>商品</th><th>價格</th><th>數量</th><th>小計</th><th></th></tr>${c.map((i,idx)=>`<tr><td>${i.name}</td><td>${money(i.price)}</td><td><input class="input" style="width:85px" type="number" min="1" value="${i.quantity}" onchange="chg(${idx},this.value)"></td><td>${money(i.price*i.quantity)}</td><td><button class="btn" onclick="del(${idx})">刪除</button></td></tr>`).join('')}</table><div class="card"><h2>總金額：${money(total)}</h2><a class="btn orange" href="checkout.html">前往結帳</a></div>`}function chg(i,v){let c=getCart();c[i].quantity=Math.max(1,Number(v));saveCart(c);render()}function del(i){let c=getCart();c.splice(i,1);saveCart(c);render()}render()
</script></body></html>
