<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>購買商品</title><link rel="stylesheet" href="css/style.css"></head><body><div id="siteHeader"></div><main class="container"><h1>購買商品</h1><div class="toolbar"><select class="input" id="cat"><option value="">全部分類</option></select><input class="input" id="q" placeholder="搜尋商品"><button class="btn orange" onclick="load()">搜尋</button></div><div id="list" class="grid"></div></main><div id="siteFooter"></div><script src="js/main.js"></script><script>
const sp=new URLSearchParams(location.search);async function init(){let cs=await api('/api/categories');cat.innerHTML='<option value="">全部分類</option>'+cs.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');cat.value=sp.get('category')||'';q.value=sp.get('q')||'';load()}async function load(){let params=new URLSearchParams();if(cat.value)params.set('category',cat.value);if(q.value)params.set('q',q.value);let ps=await api('/api/products?'+params);list.innerHTML=ps.map(p=>`<div class="card product"><a class="pimg" href="product.html?id=${p.id}">${p.image?`<img src="${p.image}">`:icon(p.category)}</a><div class="pbody"><small>${p.category}</small><h3>${p.name}</h3><div class="price">${money(p.price)}</div><p>庫存 ${p.stock}</p><button class="btn orange" onclick='addCart(${JSON.stringify(p).replaceAll("'","&#39;")})'>加入購物車</button></div></div>`).join('')||'<div class="empty">此分類尚未上架商品</div>'}cat.onchange=load;init()
</script></body></html>
