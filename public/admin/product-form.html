<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品表單</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/layout.js"></script><script>side()</script><h1 id="title">新增商品</h1><div class="box" style="width:760px;max-width:100%"><input id="name" placeholder="商品名稱"><select id="category"></select><input id="price" type="number" step="0.01" placeholder="價格"><input id="stock" type="number" placeholder="庫存"><textarea id="description" rows="5" placeholder="商品描述"></textarea><input type="file" id="file" accept="image/*"><input id="image" placeholder="圖片網址"><label><input id="active" type="checkbox" checked style="width:auto"> 上架</label> <label><input id="featured" type="checkbox" style="width:auto"> 推薦商品</label><br><button class="orange" onclick="save()">儲存</button></div><script>let id=new URLSearchParams(location.search).get('id');async function init(){let cs=await(await fetch('/api/categories')).json();category.innerHTML=cs.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');if(id){title.textContent='修改商品';let p=await(await fetch('/api/products/'+id)).json();for(let k of ['name','category','price','stock','description','image']) window[k].value=p[k]||'';active.checked=p.active!==false;featured.checked=!!p.featured}}file.onchange=async()=>{let fd=new FormData();fd.append('image',file.files[0]);let r=await fetch('/api/upload',{method:'POST',body:fd});let j=await r.json();image.value=j.url;alert('圖片已上傳')};async function save(){let data={name:name.value,category:category.value,price:price.value,stock:stock.value,description:description.value,image:image.value,active:active.checked,featured:featured.checked};let r=await fetch(id?'/api/products/'+id:'/api/products',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(r.ok){alert('已儲存');location.href='products.html'}else alert((await r.json()).message)}init()</script><script>end()</script></body></html>
