<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品管理</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/layout.js"></script><script>side()</script><h1>商品管理</h1><a class="btn orange" href="product-form.html">新增商品</a><br><br><table><thead><tr><th>圖</th><th>商品</th><th>分類</th><th>價格</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table><script>async function load(){let ps=await(await fetch('/api/products?admin=1')).json();rows.innerHTML=ps.map(p=>`<tr><td>${p.image?`<img class=pic src="${p.image}">`:'-'}</td><td>${p.name}</td><td>${p.category}</td><td>$${Number(p.price).toFixed(2)}</td><td>${p.stock}</td><td>${p.active?'上架':'下架'}</td><td><a class=btn href="product-form.html?id=${p.id}">修改</a> <button onclick="del('${p.id}')">刪除</button></td></tr>`).join('')}async function del(id){if(confirm('刪除？')){await fetch('/api/products/'+id,{method:'DELETE'});load()}}load()</script><script>end()</script></body></html>
