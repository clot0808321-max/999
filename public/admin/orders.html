<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>訂單管理</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/layout.js"></script><script>side()</script><h1>訂單管理</h1><table><thead><tr><th>訂單</th><th>客戶</th><th>商品</th><th>付款</th><th>金額</th><th>狀態</th></tr></thead><tbody id="rows"></tbody></table><script>let st=['新訂單','處理中','已出貨','已完成','已取消'];async function load(){let os=await(await fetch('/api/orders')).json();rows.innerHTML=os.map(o=>`<tr><td>${o.id}<br>${new Date(o.createdAt).toLocaleString()}</td><td>${o.customerName}<br>${o.phone}<br>${o.contact}<br>${o.address}</td><td>${o.items.map(i=>i.name+' x '+i.quantity).join('<br>')}</td><td>${o.paymentMethod||''}<br><label><input type=checkbox ${o.paid?'checked':''} onchange="upd('${o.id}',null,this.checked)"> 已收款</label></td><td>$${Number(o.total).toFixed(2)}</td><td><select onchange="upd('${o.id}',this.value,null)">${st.map(s=>`<option ${s==o.status?'selected':''}>${s}</option>`).join('')}</select></td></tr>`).join('')}async function upd(id,status,paid){let body={};if(status)body.status=status;if(paid!==null)body.paid=paid;await fetch('/api/orders/'+id+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});load()}load()</script><script>end()</script></body></html>
