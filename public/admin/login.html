<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>後台登入</title><link rel="stylesheet" href="css/admin.css"></head><body><div class="login"><div class="box"><h1>999小店 PRO 後台</h1><input id="u" value="admin"><input id="p" type="password" value="123456"><button class="orange" onclick="login()">登入</button></div></div><script>async function login(){let r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value})});if(r.ok)location.href='dashboard.html';else alert((await r.json()).message)}</script></body></html>
