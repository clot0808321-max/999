<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>儀表板</title><link rel="stylesheet" href="css/admin.css"></head><body><script src="js/layout.js"></script><script>side()</script><h1>儀表板</h1><div class="cards"><div class="card"><h3>商品</h3><b id="p">0</b></div><div class="card"><h3>訂單</h3><b id="o">0</b></div><div class="card"><h3>今日訂單</h3><b id="t">0</b></div><div class="card"><h3>低庫存</h3><b id="l">0</b></div><div class="card"><h3>未收款</h3><b id="np">0</b></div></div><script>async function init(){let ps=await(await fetch('/api/products?admin=1')).json(),os=await(await fetch('/api/orders')).json();p.textContent=ps.length;o.textContent=os.length;t.textContent=os.filter(x=>(x.createdAt||'').slice(0,10)==new Date().toISOString().slice(0,10)).length;l.textContent=ps.filter(x=>Number(x.stock)<=5).length;np.textContent=os.filter(x=>!x.paid).length}init()</script><script>end()</script></body></html>
