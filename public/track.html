<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>訂單查詢</title><link rel="stylesheet" href="css/style.css"></head><body><div id="siteHeader"></div><main class="container"><h1>訂單查詢</h1><div class="form"><input class="input" id="oid" placeholder="輸入訂單編號"><button class="btn orange" onclick="go()">查詢</button><div id="result"></div></div></main><div id="siteFooter"></div><script src="js/main.js"></script><script>oid.value=new URLSearchParams(location.search).get('id')||'';async function go(){try{let o=await api('/api/orders/'+oid.value);result.innerHTML='<div class=notice>訂單：'+o.id+'<br>狀態：'+o.status+'<br>金額：$'+Number(o.total).toFixed(2)+'</div>'}catch(e){alert(e.message)}}if(oid.value)go()</script></body></html>
