<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品詳細</title><link rel="stylesheet" href="css/style.css"></head><body><div id="siteHeader"></div><main class="container section"><div id="box"></div></main><div id="siteFooter"></div><script src="js/main.js"></script><script>
async function init(){let id=new URLSearchParams(location.search).get('id');let p=await api('/api/products/'+id);box.innerHTML=`<div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:25px"><div class="pimg" style="height:420px">${p.image?`<img src="${p.image}">`:icon(p.category)}</div><div><small>${p.category}</small><h1>${p.name}</h1><div class="price">${money(p.price)}</div><p class="lead">${p.description||''}</p><p>庫存 ${p.stock}</p><input class="input" style="max-width:100px" id="qty" type="number" min="1" value="1"><br><br><button class="btn orange" onclick='addCart(${JSON.stringify(p).replaceAll("'","&#39;")},qty.value)'>加入購物車</button></div></div>`}init()
</script></body></html>
